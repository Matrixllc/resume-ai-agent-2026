domain_matrix:
  domains: [运营, 金融, 能源]
  templates:
    - id: count
      family: hard_filter
      question: "有多少个{domain}领域候选人？"
      expected_intent: candidate_count
      expected_scenario: hard_filter
    - id: recall
      family: open_recall
      question: "找找可能和{domain}相关的人"
      expected_intent: candidate_filter
      expected_scenario: open_recall
