version: "v2"

cases:
  - id: hard_filter_count_list
    family: hard_filter
    question: "有多少个金融领域候选人，都有谁？"
    tiers: [policy, plan, runtime, llm]
    expected:
      intent: compound
      sub_intents: [candidate_count, candidate_list]
      scenarios: {candidate_count: hard_filter, candidate_list: hard_filter}
      status: ok

  - id: open_recall_count_list
    family: open_recall
    question: "可能有运营领域经验的候选人都有谁，有多少个？"
    tiers: [policy, plan, runtime, llm]
    expected:
      intent: compound
      sub_intents: [candidate_count, candidate_list]
      scenarios: {candidate_count: open_recall, candidate_list: open_recall}
      status: ok

  - id: open_recall
    family: open_recall
